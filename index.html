<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MinhasContas">
<title>MinhasContas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #12131a;
  --card:   #1c1e2a;
  --card2:  #22253a;
  --border: rgba(255,255,255,0.07);
  --text:   #ffffff;
  --text2:  rgba(255,255,255,0.55);
  --text3:  rgba(255,255,255,0.28);
  --accent: #7c7cff;
  --green:  #2ecc71;
  --yellow: #f5a623;
  --red:    #e74c3c;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;}
.safe-top{height:calc(var(–safe-top) + 0px);flex-shrink:0;}

/* TOP BAR */
.topbar{
display:flex;align-items:center;justify-content:space-between;
padding:10px 20px 8px;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.app-icon{
width:38px;height:38px;border-radius:10px;
background:linear-gradient(135deg,#2a2d45,#1c1e2a);
border:1px solid var(–border);
display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}
.app-name{font-size:1.15rem;font-weight:700;letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-date{font-size:0.78rem;color:var(–text2);}
.topbar-btn{
width:34px;height:34px;border-radius:10px;
background:var(–card);border:1px solid var(–border);
display:flex;align-items:center;justify-content:center;
font-size:1rem;cursor:pointer;border:none;
}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
.scroll::-webkit-scrollbar{display:none;}

/* BOTTOM NAV */
.bnav{
flex-shrink:0;
background:var(–card);
border-top:1px solid var(–border);
display:flex;
padding-bottom:var(–safe-bot);
}
.bni{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:9px 4px 7px;gap:3px;cursor:pointer;border:none;background:none;
color:var(–text3);font-size:0.62rem;font-weight:500;font-family:inherit;
-webkit-user-select:none;transition:color 0.15s;
}
.bni.active{color:var(–yellow);}
.bni svg{width:22px;height:22px;}
.bni-ico{font-size:1.3rem;line-height:1;}

/* PAGES */
.page{display:none;flex-direction:column;height:100%;}
.page.active{display:flex;}

/* ── CARDS ── */
.card{
background:var(–card);border-radius:18px;
border:1px solid var(–border);
padding:18px;margin-bottom:12px;
}
.card-sm{border-radius:16px;padding:16px;}

/* ── HERO CARD ── */
.hero{
background:linear-gradient(135deg,#1e2038 0%,#252840 60%,#1e2038 100%);
border-radius:20px;border:1px solid rgba(124,124,255,0.15);
padding:22px;margin-bottom:12px;position:relative;overflow:hidden;
}
.hero::before{
content:’’;position:absolute;right:-30px;top:-30px;
width:140px;height:140px;border-radius:50%;
background:radial-gradient(circle,rgba(124,124,255,0.12),transparent 70%);
}
.hero-label{font-size:0.68rem;font-weight:700;color:var(–text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.hero-val{font-size:2.4rem;font-weight:800;letter-spacing:-1px;margin-bottom:14px;}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;}
.hero-chip{
display:flex;align-items:center;gap:6px;
background:rgba(255,255,255,0.07);border-radius:20px;
padding:5px 12px;font-size:0.75rem;font-weight:600;
}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-green{background:var(–green);}
.dot-red{background:var(–red);}
.dot-blue{background:#5b8dee;}

/* ── PRÓXIMA CONTA ── */
.next-card{
background:linear-gradient(135deg,#2a1f0a,#352808);
border:1.5px solid var(–yellow);
border-radius:18px;padding:16px;margin-bottom:12px;
}
.next-label{font-size:0.65rem;font-weight:800;color:var(–yellow);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.next-row{display:flex;align-items:center;gap:12px;}
.next-ico{font-size:1.4rem;}
.next-info{flex:1;}
.next-name{font-size:0.95rem;font-weight:700;}
.next-date{font-size:0.75rem;color:var(–text2);margin-top:2px;}
.next-val{font-size:1.05rem;font-weight:800;color:var(–red);}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{
background:var(–card);border-radius:18px;border:1px solid var(–border);
padding:16px;
}
.stat-ico{font-size:1.4rem;margin-bottom:8px;}
.stat-val{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px;}
.stat-label{font-size:0.72rem;color:var(–text2);font-weight:500;}

/* ── FALTA PAGAR ── */
.falta-card{
background:var(–card);border-radius:18px;border:1px solid var(–border);
padding:18px;margin-bottom:12px;
}
.falta-label{font-size:0.65rem;font-weight:700;color:var(–text2);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px;}
.falta-val{font-size:1.8rem;font-weight:800;color:var(–red);letter-spacing:-0.5px;margin-bottom:4px;}
.falta-sub{font-size:0.75rem;color:var(–text2);margin-bottom:12px;}
.progress-track{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#5b8dee,var(–accent));transition:width 0.5s;}

/* ── SECTION ── */
.sec-title{
font-size:0.65rem;font-weight:700;color:var(–text2);
letter-spacing:1.5px;text-transform:uppercase;
margin-bottom:10px;padding-left:2px;
}

/* ── CONTAS URGENTES / LIST ── */
.bill-list{background:var(–card);border-radius:18px;border:1px solid var(–border);overflow:hidden;margin-bottom:12px;}
.bill-item{
display:flex;align-items:center;gap:12px;
padding:14px 16px;border-bottom:1px solid var(–border);
cursor:pointer;-webkit-user-select:none;transition:background 0.1s;
}
.bill-item:last-child{border-bottom:none;}
.bill-item:active{background:var(–card2);}
.bill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.bill-dot-red{background:var(–red);}
.bill-dot-yellow{background:var(–yellow);}
.bill-dot-green{background:var(–green);}
.bill-icon-sm{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.bill-mid{flex:1;min-width:0;}
.bill-name{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bill-date{font-size:0.72rem;color:var(–text2);margin-top:2px;}
.bill-right{text-align:right;flex-shrink:0;}
.bill-val{font-size:0.9rem;font-weight:700;}
.bill-status{font-size:0.68rem;font-weight:700;margin-top:2px;}
.bill-status.atrasada{color:var(–red);}
.bill-status.pendente{color:var(–yellow);}
.bill-status.paga{color:var(–green);}

/* ── CHECK BTN ── */
.chk{
width:26px;height:26px;border-radius:50%;
border:2px solid rgba(255,255,255,0.2);background:none;
cursor:pointer;display:flex;align-items:center;justify-content:center;
font-size:0.75rem;color:transparent;flex-shrink:0;transition:all 0.15s;
}
.chk.on{background:var(–green);border-color:var(–green);color:#fff;}

/* ── MONTH NAV ── */
.month-strip{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px;}
.month-lbl{font-size:1rem;font-weight:700;text-transform:capitalize;}
.month-btns{display:flex;gap:6px;}
.mbtn{
width:32px;height:32px;border-radius:50%;
background:var(–card);border:1px solid var(–border);
color:var(–text2);font-size:1.1rem;
display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.mbtn:active{background:var(–card2);}
.mbtn-t{font-size:0.55rem;font-weight:800;color:var(–yellow);}

/* ── SEARCH ── */
.search-bar{
background:var(–card);border:1px solid var(–border);
border-radius:12px;display:flex;align-items:center;gap:8px;
padding:10px 14px;margin-bottom:12px;
}
.search-bar input{background:none;border:none;outline:none;font-family:inherit;font-size:0.88rem;color:var(–text);flex:1;}
.search-bar input::placeholder{color:var(–text3);}

/* ── CHIPS ── */
.chips{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
padding:6px 14px;border-radius:20px;font-size:0.72rem;font-weight:600;white-space:nowrap;
background:var(–card);border:1.5px solid var(–border);color:var(–text2);
cursor:pointer;-webkit-user-select:none;
}
.chip.on{background:rgba(245,166,35,0.12);color:var(–yellow);border-color:rgba(245,166,35,0.4);}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-dow{text-align:center;font-size:0.62rem;font-weight:600;color:var(–text3);padding:4px 0;}
.cal-cell{background:var(–card);border-radius:8px;min-height:60px;padding:5px;border:1px solid var(–border);}
.cal-cell.today{border-color:var(–yellow);}
.cal-cell.empty{background:none;border-color:transparent;}
.cal-num{font-size:0.7rem;color:var(–text2);font-weight:600;margin-bottom:3px;}
.cal-dot-item{font-size:0.52rem;font-weight:700;padding:1px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* ── HIST ── */
.hist-card{
background:var(–card);border-radius:16px;border:1px solid var(–border);
padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
margin-bottom:8px;cursor:pointer;-webkit-user-select:none;
}
.hist-card:active{background:var(–card2);}
.hist-month{font-size:0.9rem;font-weight:700;text-transform:capitalize;}
.hist-sub{font-size:0.72rem;color:var(–text2);margin-top:2px;}
.hist-val{font-size:1rem;font-weight:800;color:var(–yellow);}

/* ── SETTINGS ── */
.cfg-group{background:var(–card);border-radius:18px;border:1px solid var(–border);overflow:hidden;margin-bottom:16px;}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(–border);cursor:pointer;-webkit-user-select:none;}
.cfg-row:last-child{border-bottom:none;}
.cfg-row:active{background:var(–card2);}
.cfg-label{font-size:0.88rem;font-weight:600;}
.cfg-sub{font-size:0.72rem;color:var(–text2);margin-top:2px;}
.cfg-row.danger .cfg-label{color:var(–red);}
.cfg-meta-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(–border);}
.cfg-meta-row input{background:none;border:none;outline:none;font-family:inherit;font-size:0.88rem;color:var(–text);text-align:right;width:130px;}

/* ── SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{
background:var(–card);border-radius:22px 22px 0 0;
width:100%;max-width:430px;margin:0 auto;
max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
padding-bottom:calc(var(–safe-bot)+10px);
}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0;}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;}
.sheet-title{font-size:1.1rem;font-weight:700;}
.sheet-x{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:var(–text2);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:18px;}

/* ── FORM ── */
.f-section{background:var(–card2);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.f-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(–border);gap:12px;}
.f-row:last-child{border-bottom:none;}
.f-lbl{font-size:0.85rem;font-weight:600;width:90px;flex-shrink:0;}
.f-row input,.f-row select,.f-row textarea{background:none;border:none;outline:none;font-family:inherit;font-size:0.85rem;color:var(–text);flex:1;text-align:right;-webkit-appearance:none;}
.f-row input::placeholder,.f-row textarea::placeholder{color:var(–text3);}
.f-row select option{background:#1c1e2a;}
.f-row textarea{text-align:left;resize:none;min-height:58px;padding-top:2px;}

/* cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;}
.cat-opt{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;-webkit-user-select:none;}
.cat-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(255,255,255,0.07);border:2px solid transparent;transition:all 0.12s;}
.cat-opt.sel .cat-ico{border-color:var(–yellow);background:rgba(245,166,35,0.12);}
.cat-name{font-size:0.6rem;color:var(–text2);font-weight:600;}

.btn-save{width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,#f5a623,#e8941a);color:#000;font-family:inherit;font-size:1rem;font-weight:800;border:none;cursor:pointer;margin-top:4px;}
.btn-save:active{opacity:0.85;}

/* detail */
.det-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.det-btn{padding:14px;border-radius:13px;background:var(–card2);border:none;color:var(–text);font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.det-btn:active{opacity:0.8;}
.det-btn.ok{color:var(–green);}
.det-btn.danger{color:var(–red);}

/* FAB */
.fab{
position:absolute;bottom:calc(68px + var(–safe-bot) + 14px);right:18px;
width:56px;height:56px;border-radius:50%;
background:linear-gradient(135deg,#f5a623,#e8941a);
border:none;color:#000;font-size:1.7rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 18px rgba(245,166,35,0.45);z-index:50;
-webkit-user-select:none;transition:transform 0.12s;
}
.fab:active{transform:scale(0.91);}

/* empty */
.empty{text-align:center;padding:48px 16px;color:var(–text3);}
.empty-ico{font-size:2.5rem;margin-bottom:10px;}
.empty-txt{font-size:0.85rem;}

/* TOAST */
.toast{position:fixed;top:calc(var(–safe-top)+54px);left:50%;transform:translateX(-50%) translateY(-10px);background:var(–card2);color:var(–text);padding:10px 22px;border-radius:20px;font-size:0.82rem;font-weight:700;z-index:500;opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(–green);color:#000;}
.toast.err{background:var(–red);color:#fff;}

/* cat colors */
.ico-moradia{background:rgba(91,141,238,0.18);}
.ico-transporte{background:rgba(255,159,10,0.18);}
.ico-alimentacao{background:rgba(46,204,113,0.18);}
.ico-saude{background:rgba(231,76,60,0.18);}
.ico-assinatura{background:rgba(124,124,255,0.18);}
.ico-educacao{background:rgba(245,166,35,0.18);}
.ico-lazer{background:rgba(100,210,255,0.18);}
.ico-outros{background:rgba(142,142,147,0.18);}
</style>

</head>

    </button>
    <button class="bni" id="nav-hist" onclick="setPage('hist')">
      <span class="bni-ico">📊</span>Histórico
    </button>
  </nav>

<button class="fab" onclick="openAdd()" id="fab-btn">+</button>

  <!-- SHEET: NOVA/EDITAR CONTA -->

  <div class="sheet-overlay" id="add-sheet" onclick="closeSheetOut(event,'add-sheet')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hdr">
        <div class="sheet-title" id="add-title">Nova Conta</div>
        <button class="sheet-x" onclick="closeSheet('add-sheet')">✕</button>
      </div>
      <div class="sheet-body">
        <div class="sec-title">CATEGORIA</div>
        <div class="f-section" style="background:var(--card2)">
          <div class="cat-grid" id="cat-grid"></div>
        </div>
        <div class="f-section">
          <div class="f-row">
            <div class="f-lbl">Nome</div>
            <input type="text" id="f-name" placeholder="Ex: Conta de luz">
          </div>
          <div class="f-row">
            <div class="f-lbl">Valor</div>
            <input type="number" id="f-value" placeholder="R$ 0,00" step="0.01" min="0" inputmode="decimal">
          </div>
          <div class="f-row">
            <div class="f-lbl">Vencimento</div>
            <input type="date" id="f-date">
          </div>
        </div>
        <div class="f-section">
          <div class="f-row">
            <div class="f-lbl">Recorrência</div>
            <select id="f-rec">
              <option value="none">Nenhuma</option>
              <option value="monthly">Mensal</option>
              <option value="quarterly">Trimestral</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
          <div class="f-row">
            <div class="f-lbl">Parcelas</div>
            <input type="number" id="f-inst" placeholder="—" min="1" max="120" inputmode="numeric">
          </div>
          <div class="f-row">
            <div class="f-lbl">Parcela nº</div>
            <input type="number" id="f-inst-c" placeholder="—" min="1" max="120" inputmode="numeric">
          </div>
          <div class="f-row">
            <div class="f-lbl">Obs</div>
            <textarea id="f-note" placeholder="Anotação..."></textarea>
          </div>
        </div>
        <button class="btn-save" onclick="saveBill()">Salvar conta</button>
      </div>
    </div>
  </div>

  <!-- SHEET: DETALHE -->

  <div class="sheet-overlay" id="det-sheet" onclick="closeSheetOut(event,'det-sheet')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-hdr">
        <div class="sheet-title" id="det-title"></div>
        <button class="sheet-x" onclick="closeSheet('det-sheet')">✕</button>
      </div>
      <div class="sheet-body" id="det-body"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='mc_bills_v1';
let cur=new Date(),editId=null,selCat='outros',chipF='all',pg='inicio';

const cats=[
  {id:'moradia',ico:'🏠',name:'Moradia'},
  {id:'transporte',ico:'🚗',name:'Transp.'},
  {id:'alimentacao',ico:'🍔',name:'Aliment.'},
  {id:'saude',ico:'💊',name:'Saúde'},
  {id:'assinatura',ico:'📺',name:'Assinatura'},
  {id:'educacao',ico:'📚',name:'Educação'},
  {id:'lazer',ico:'🎮',name:'Lazer'},
  {id:'outros',ico:'📦',name:'Outros'},
];

function gd(){try{return JSON.parse(localStorage.getItem(KEY))||{bills:[],meta:null};}catch{return{bills:[],meta:null};}}
function sd(d){localStorage.setItem(KEY,JSON.stringify(d));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fR(v,compact){
  const n=parseFloat(v)||0;
  if(compact&&n>=1000) return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fD(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function fDS(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}`;}
function tStr(){return new Date().toISOString().slice(0,10);}
function mKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function mBills(bills,d){const k=mKey(d);return bills.filter(b=>b.date&&b.date.startsWith(k));}
function cat(id){return cats.find(c=>c.id===id)||cats[7];}
function st(b){if(b.status==='paga')return'paga';if(b.date<tStr())return'atrasada';return'pendente';}
function dTo(d){const a=new Date(d+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((a-n)/86400000);}

// ── TOPBAR DATE ──
function updateTopbarDate(){
  const d=new Date();
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('topbar-date').textContent=`${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
}
updateTopbarDate();

// ── PAGES ──
function setPage(p){
  pg=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(e=>e.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  const ni=document.getElementById('nav-'+p);
  if(ni)ni.classList.add('active');
  // FAB only on contas/inicio
  document.getElementById('fab-btn').style.display=(p==='inicio'||p==='contas')?'flex':'none';
  if(p==='inicio')renderInicio();
  if(p==='contas')renderContas();
  if(p==='cal')renderCal();
  if(p==='hist')renderHist();
  if(p==='cfg'){const d=gd();const mi=document.getElementById('meta-input');if(mi)mi.value=d.meta||'';}
}

function changeMonth(d){cur=new Date(cur.getFullYear(),cur.getMonth()+d,1);if(pg==='contas')renderContas();if(pg==='cal')renderCal();}
function goToday(){cur=new Date();if(pg==='contas')renderContas();if(pg==='cal')renderCal();}
function setChip(el){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');chipF=el.dataset.f;renderContas();}

// ── RENDER INÍCIO ──
function renderInicio(){
  const d=gd();
  const mbs=mBills(d.bills,cur);
  const today=tStr();

  let total=0,pago=0,pend=0,atras=0,cP=0,cA=0;
  mbs.forEach(b=>{const v=parseFloat(b.value)||0;total+=v;const s=st(b);if(s==='paga'){pago+=v;cP++;}else if(s==='atrasada'){atras+=v;cA++;}else pend+=v;});

  // hero
  const saldo=pago-0; // saldo das pagas
  document.getElementById('hero-card').innerHTML=`
    <div class="hero-label">TOTAL DO MÊS</div>
    <div class="hero-val">${fR(total)}</div>
    <div class="hero-chips">
      <div class="hero-chip"><div class="dot dot-green"></div>Pagas ${fR(pago)}</div>
      <div class="hero-chip"><div class="dot dot-red"></div>Pendentes ${fR(pend+atras)}</div>
      ${atras>0?`<div class="hero-chip"><div class="dot" style="background:var(--red)"></div>Atrasadas ${fR(atras)}</div>`:''}
    </div>`;

  // próxima conta não paga
  const proximas=mbs.filter(b=>st(b)!=='paga').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const nw=document.getElementById('next-wrap');
  if(proximas.length>0){
    const p=proximas[0],c=cat(p.category),days=dTo(p.date);
    const dateLabel=days===0?'Vence hoje!':days<0?`Venceu há ${Math.abs(days)} dia${Math.abs(days)>1?'s':''}`:days===1?'Vence amanhã':`Vence em ${days} dias`;
    nw.innerHTML=`<div class="next-card">
      <div class="next-label">PRÓXIMA CONTA</div>
      <div class="next-row">
        <div class="next-ico">${c.ico}</div>
        <div class="next-info">
          <div class="next-name">${p.name}</div>
          <div class="next-date">${dateLabel} · ${fD(p.date)}</div>
        </div>
        <div class="next-val">${p.value?fR(p.value):'—'}</div>
      </div>
    </div>`;
  } else nw.innerHTML='';

  // falta pagar
  const falta=pend+atras;
  const fw=document.getElementById('falta-wrap');
  if(falta>0){
    const pct=Math.min((pago/total)*100,100)||0;
    const pendCount=mbs.filter(b=>st(b)!=='paga').length;
    fw.innerHTML=`<div class="falta-card">
      <div class="falta-label">FALTA PAGAR ESTE MÊS</div>
      <div class="falta-val">${fR(falta)}</div>
      <div class="falta-sub">${fR(pago)} de ${fR(total)} já pagos · ${pendCount} conta${pendCount!==1?'s':''} pendente${pendCount!==1?'s':''}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  } else if(mbs.length>0){
    fw.innerHTML=`<div class="falta-card">
      <div class="falta-label">SITUAÇÃO DO MÊS</div>
      <div class="falta-val" style="color:var(--green)">Tudo pago! ✓</div>
      <div class="falta-sub">Todas as ${mbs.length} contas foram pagas</div>
      <div class="progress-track"><div class="progress-fill" style="width:100%;background:var(--green)"></div></div>
    </div>`;
  } else fw.innerHTML='';

  // stat row
  const naFila=mbs.filter(b=>st(b)!=='paga').length;
  document.getElementById('stat-row').innerHTML=`
    <div class="stat-card">
      <div class="stat-ico">⏰</div>
      <div class="stat-val" style="color:var(--yellow)">${fR(pend+atras)}</div>
      <div class="stat-label">${naFila} conta${naFila!==1?'s':''} na fila</div>
    </div>
    <div class="stat-card">
      <div class="stat-ico">✅</div>
      <div class="stat-val" style="color:var(--green)">${fR(pago)}</div>
      <div class="stat-label">${cP} paga${cP!==1?'s':''} este mês</div>
    </div>`;

  // urgentes (atrasadas + vencendo em 3 dias)
  const urgentes=mbs.filter(b=>st(b)!=='paga'&&dTo(b.date)<=3).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const uw=document.getElementById('urgentes-wrap');
  if(urgentes.length>0){
    uw.innerHTML=`<div class="sec-title">CONTAS URGENTES</div>
    <div class="bill-list">${urgentes.map(b=>{
      const s=st(b),days=dTo(b.date);
      const dc=s==='atrasada'?'bill-dot-red':days<=1?'bill-dot-red':'bill-dot-yellow';
      const stLabel=s==='atrasada'?'Atrasada':days===0?'Vence hoje':days===1?'Amanhã':`em ${days}d`;
      return`<div class="bill-item" onclick="openDetail('${b.id}')">
        <div class="bill-dot ${dc}"></div>
        <div class="bill-mid">
          <div class="bill-name">${b.name}</div>
          <div class="bill-date">${fD(b.date)}</div>
        </div>
        <div class="bill-right">
          <div class="bill-val" style="color:var(--red)">${b.value?fR(b.value):'—'}</div>
          <div class="bill-status atrasada">${stLabel}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  } else uw.innerHTML='';

  // meta bar at bottom of inicio if set
  const meta=parseFloat(d.meta);
  if(meta>0){
    const pct2=Math.min((total/meta)*100,100);
    const cls=pct2>100?'var(--red)':pct2>80?'var(--yellow)':'var(--green)';
    uw.innerHTML+= `<div class="falta-card" style="margin-top:0">
      <div class="falta-label">🎯 META MENSAL</div>
      <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text2);margin-bottom:8px"><span>${fR(total)}</span><span>/ ${fR(meta)}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct2}%;background:${cls}"></div></div>
    </div>`;
  }
}

// ── RENDER CONTAS ──
function renderContas(){
  const d=gd();
  const mLabel=cur.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  document.getElementById('contas-month').textContent=mLabel;
  const mbs=mBills(d.bills,cur);
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=mbs.filter(b=>{
    if(q&&!b.name.toLowerCase().includes(q))return false;
    if(chipF!=='all'&&st(b)!==chipF)return false;
    return true;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const w=document.getElementById('contas-list');
  if(!list.length){w.innerHTML=`<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Nenhuma conta neste mês</div></div>`;return;}
  w.innerHTML=`<div class="bill-list">${list.map(b=>{
    const s=st(b),c=cat(b.category),days=dTo(b.date);
    const dc=s==='paga'?'bill-dot-green':s==='atrasada'?'bill-dot-red':'bill-dot-yellow';
    const iB=b.installments>1?` · ${b.installmentCurrent||1}/${b.installments}`:'';
    const rB=b.recurrence&&b.recurrence!=='none'?' ↺':'';
    let stL=s==='paga'?'Paga':s==='atrasada'?`Atrasada ${Math.abs(days)}d`:days===0?'Vence hoje':days===1?'Amanhã':`em ${days}d`;
    return`<div class="bill-item" onclick="openDetail('${b.id}')">
      <div class="bill-icon-sm ico-${b.category||'outros'}">${c.ico}</div>
      <div class="bill-mid">
        <div class="bill-name">${b.name}${iB}${rB}</div>
        <div class="bill-date">${fD(b.date)}</div>
      </div>
      <div class="bill-right">
        <div class="bill-val">${b.value?fR(b.value):'—'}</div>
        <div class="bill-status ${s}">${stL}</div>
      </div>
      <button class="chk ${s==='paga'?'on':''}" onclick="event.stopPropagation();togglePaid('${b.id}')">${s==='paga'?'✓':''}</button>
    </div>`;
  }).join('')}</div>`;
}

// ── RENDER CAL ──
function renderCal(){
  const d=gd(),year=cur.getFullYear(),month=cur.getMonth();
  document.getElementById('cal-month').textContent=cur.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate();
  const mbs=mBills(d.bills,cur),byDay={};
  mbs.forEach(b=>{if(b.date){const dd=parseInt(b.date.split('-')[2]);if(!byDay[dd])byDay[dd]=[];byDay[dd].push(b);}});
  const dows=['D','S','T','Q','Q','S','S'];
  let h=`<div class="cal-grid">${dows.map(x=>`<div class="cal-dow">${x}</div>`).join('')}`;
  for(let i=0;i<first;i++)h+=`<div class="cal-cell empty"></div>`;
  const t=tStr();
  for(let dd=1;dd<=days;dd++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const bds=byDay[dd]||[];
    h+=`<div class="cal-cell ${ds===t?'today':''}"><div class="cal-num">${dd}</div>
    ${bds.slice(0,2).map(b=>{const s=st(b);const col=s==='paga'?'var(--green)':s==='atrasada'?'var(--red)':'var(--yellow)';
    return`<div class="cal-dot-item" style="background:${col}22;color:${col}">${cat(b.category).ico} ${b.name}</div>`;}).join('')}
    ${bds.length>2?`<div style="font-size:0.5rem;color:var(--text3)">+${bds.length-2}</div>`:''}</div>`;
  }
  h+='</div>';
  document.getElementById('cal-wrap').innerHTML=h;
}

// ── RENDER HIST ──
function renderHist(){
  const d=gd(),months={};
  d.bills.forEach(b=>{if(b.date){const k=b.date.slice(0,7);if(!months[k])months[k]=[];months[k].push(b);}});
  const sorted=Object.keys(months).sort().reverse();
  const w=document.getElementById('hist-scroll');
  if(!sorted.length){w.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div class="empty-txt">Nenhum histórico ainda</div></div>`;return;}
  w.innerHTML=`<div style="padding:16px 0 0">`+sorted.map(k=>{
    const[y,m]=k.split('-');
    const label=new Date(+y,+m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    const bs=months[k],total=bs.reduce((s,b)=>s+(parseFloat(b.value)||0),0),pagas=bs.filter(b=>st(b)==='paga').length;
    return`<div class="hist-card" onclick="jumpMonth('${k}')"><div><div class="hist-month">${label}</div><div class="hist-sub">${bs.length} contas · ${pagas} pagas</div></div><div class="hist-val">${fR(total)}</div></div>`;
  }).join('')+`</div>`;
}

function jumpMonth(k){const[y,m]=k.split('-');cur=new Date(+y,+m-1,1);setPage('contas');}

// ── CAT GRID ──
function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=cats.map(c=>`
    <div class="cat-opt ${c.id===selCat?'sel':''}" id="co-${c.id}" onclick="pickCat('${c.id}')">
      <div class="cat-ico ico-${c.id}">${c.ico}</div>
      <div class="cat-name">${c.name}</div>
    </div>`).join('');
}
function pickCat(id){selCat=id;document.querySelectorAll('.cat-opt').forEach(e=>e.classList.remove('sel'));document.getElementById('co-'+id).classList.add('sel');}

// ── SHEETS ──
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function closeSheetOut(e,id){if(e.target===document.getElementById(id))closeSheet(id);}

function openAdd(bid){
  editId=bid||null;
  document.getElementById('add-title').textContent=bid?'Editar Conta':'Nova Conta';
  selCat='outros';
  if(bid){
    const b=gd().bills.find(x=>x.id===bid);
    if(b){selCat=b.category||'outros';document.getElementById('f-name').value=b.name||'';document.getElementById('f-value').value=b.value||'';document.getElementById('f-date').value=b.date||'';document.getElementById('f-rec').value=b.recurrence||'none';document.getElementById('f-inst').value=b.installments||'';document.getElementById('f-inst-c').value=b.installmentCurrent||'';document.getElementById('f-note').value=b.note||'';}
  }else{
    document.getElementById('f-name').value='';document.getElementById('f-value').value='';
    document.getElementById('f-date').value=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-10`;
    document.getElementById('f-rec').value='none';document.getElementById('f-inst').value='';document.getElementById('f-inst-c').value='';document.getElementById('f-note').value='';
  }
  buildCatGrid();openSheet('add-sheet');
}

function saveBill(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Informe o nome','err');return;}
  const bill={id:editId||uid(),name,value:document.getElementById('f-value').value,date:document.getElementById('f-date').value,category:selCat,recurrence:document.getElementById('f-rec').value,status:'pendente',installments:parseInt(document.getElementById('f-inst').value)||null,installmentCurrent:parseInt(document.getElementById('f-inst-c').value)||1,note:document.getElementById('f-note').value.trim(),paidDate:''};
  const d=gd();
  if(editId){const i=d.bills.findIndex(b=>b.id===editId);if(i>=0){bill.status=d.bills[i].status;bill.paidDate=d.bills[i].paidDate;d.bills[i]=bill;}}
  else{
    d.bills.push(bill);
    if(bill.installments>1){const[y,m,dd]=bill.date.split('-');for(let i=2;i<=bill.installments;i++){const nd=new Date(+y,+m-1+(i-1),+dd);d.bills.push({...bill,id:uid(),date:nd.toISOString().slice(0,10),installmentCurrent:i,status:'pendente',paidDate:''}); }}
  }
  sd(d);closeSheet('add-sheet');
  if(pg==='inicio')renderInicio();else renderContas();
  toast(editId?'Atualizado!':'Conta adicionada!','ok');
}

function openDetail(id){
  const b=gd().bills.find(x=>x.id===id);if(!b)return;
  const c=cat(b.category),s=st(b);
  document.getElementById('det-title').textContent=b.name;
  const sCol={paga:'var(--green)',pendente:'var(--yellow)',atrasada:'var(--red)'};
  const sLbl={paga:'Paga',pendente:'Pendente',atrasada:'Atrasada'};
  document.getElementById('det-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div class="bill-icon-sm ico-${b.category||'outros'}" style="width:52px;height:52px;font-size:1.5rem;border-radius:14px">${c.ico}</div>
      <div><div style="font-size:1.3rem;font-weight:800">${b.value?fR(b.value):'Sem valor'}</div><div style="font-size:0.8rem;color:${sCol[s]};font-weight:700;margin-top:3px">${sLbl[s]}</div></div>
    </div>
    <div class="f-section" style="margin-bottom:14px">
      <div class="f-row"><div class="f-lbl" style="color:var(--text2)">Vencimento</div><div style="font-size:0.85rem">${fD(b.date)}</div></div>
      <div class="f-row"><div class="f-lbl" style="color:var(--text2)">Categoria</div><div style="font-size:0.85rem">${c.ico} ${c.name}</div></div>
      ${b.recurrence&&b.recurrence!=='none'?`<div class="f-row"><div class="f-lbl" style="color:var(--text2)">Recorrência</div><div style="font-size:0.85rem">${{monthly:'Mensal',quarterly:'Trimestral',yearly:'Anual'}[b.recurrence]}</div></div>`:''}
      ${b.installments>1?`<div class="f-row"><div class="f-lbl" style="color:var(--text2)">Parcela</div><div style="font-size:0.85rem">${b.installmentCurrent||1}/${b.installments}</div></div>`:''}
      ${b.note?`<div class="f-row"><div class="f-lbl" style="color:var(--text2)">Obs</div><div style="font-size:0.82rem;color:var(--text2);text-align:right">${b.note}</div></div>`:''}
      ${b.paidDate?`<div class="f-row"><div class="f-lbl" style="color:var(--text2)">Pago em</div><div style="font-size:0.85rem">${fD(b.paidDate)}</div></div>`:''}
    </div>
    <div class="det-actions">
      <button class="det-btn ok" onclick="togglePaid('${id}');closeSheet('det-sheet')">${s==='paga'?'↩ Desfazer':'✓ Marcar paga'}</button>
      <button class="det-btn" onclick="closeSheet('det-sheet');setTimeout(()=>openAdd('${id}'),220)">✏️ Editar</button>
      <button class="det-btn" onclick="dupBill('${id}');closeSheet('det-sheet')">⧉ Duplicar</button>
      <button class="det-btn danger" onclick="delBill('${id}')">🗑 Excluir</button>
    </div>`;
  openSheet('det-sheet');
}

function togglePaid(id){const d=gd();const b=d.bills.find(x=>x.id===id);if(b){b.status=b.status==='paga'?'pendente':'paga';b.paidDate=b.status==='paga'?tStr():'';}sd(d);if(pg==='inicio')renderInicio();else renderContas();}
function delBill(id){if(!confirm('Excluir esta conta?'))return;const d=gd();d.bills=d.bills.filter(b=>b.id!==id);sd(d);closeSheet('det-sheet');if(pg==='inicio')renderInicio();else renderContas();toast('Conta excluída','err');}
function dupBill(id){const d=gd();const b=d.bills.find(x=>x.id===id);if(!b)return;const[y,m,dd]=(b.date||tStr()).split('-');const nd=new Date(+y,+m,+dd);d.bills.push({...b,id:uid(),status:'pendente',paidDate:'',date:nd.toISOString().slice(0,10)});sd(d);if(pg==='inicio')renderInicio();else renderContas();toast('Duplicada pro próximo mês!','ok');}

function saveMeta(){const v=document.getElementById('meta-input').value;const d=gd();d.meta=v?parseFloat(v):null;sd(d);}

function exportData(){const d=gd();const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`minhascontas-${tStr()}.json`;a.click();URL.revokeObjectURL(url);toast('Backup exportado!','ok');}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.bills)throw 0;const d=gd();const ids=new Set(d.bills.map(b=>b.id));let n=0;imp.bills.forEach(b=>{if(!ids.has(b.id)){d.bills.push(b);n++;}});if(imp.meta)d.meta=imp.meta;sd(d);renderInicio();toast(`${n} contas importadas!`,'ok');}catch{toast('Arquivo inválido','err');}e.target.value='';};r.readAsText(file);}
function clearAll(){if(!confirm('Apagar TODOS os dados?\n\nFaça backup antes!'))return;sd({bills:[],meta:null});renderInicio();toast('Dados apagados','err');}

function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.classList.remove('show'),2500);}

renderInicio();
</script>

</body>
</html>
